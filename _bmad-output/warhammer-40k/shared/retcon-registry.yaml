# Retcon Registry - Lorekeeper Cross-Reference
# Purpose: Track known lore retcons so agents don't output outdated information
# Updated by: Lorekeeper when new retcons are discovered
# Version: 1.0 | Last Updated: 2026-02-16

# How to use:
# 1. Lorekeeper: check this registry before outputting lore claims
# 2. If a claim touches a retconned area, use the LATEST canonical version
# 3. Note the retcon in output so user understands the change

retcons:
  - id: female-custodes
    faction: Adeptus Custodes
    date_retconned: 2024
    old_claim: "All Custodians were depicted as male across 30+ years of lore"
    new_claim: "Since the first of the Ten Thousand were created, there have always been female Custodians"
    source: "10th Edition Codex: Adeptus Custodes (2024), page 14"
    notes: "This is a 'retroactive addition' rather than an outright contradiction. No prior source explicitly stated Custodes were exclusively male, but all depictions were male."
    community_response: "Mixed - significant debate"
    training_data_risk: HIGH  # Pre-2024 training data will contradict this

  - id: eldar-wraithbone
    faction: Aeldari
    date_retconned: 2025
    old_claim: "Wraithbone is solidified warp energy manipulated by Bonesingers into any shape"
    new_claim: "Wraithbone is a composite material formed from various compounds, ores and minerals; it is as much grown as it is forged"
    source: "10th Edition Codex: Aeldari (2025)"
    notes: "This fundamentally changes Eldar technology from psychic/warp-based to material science. Major impact on faction identity."
    community_response: "Strong backlash from Eldar players"
    training_data_risk: HIGH  # Decades of prior lore describes the old version

  - id: dark-imperium-timeline
    faction: Imperium (general)
    date_retconned: 2021
    old_claim: "The events of Dark Imperium occurred immediately after the Great Rift opened"
    new_claim: "The events of Dark Imperium occur approximately 12 years after the opening of the Great Rift"
    source: "Dark Imperium novel reprints (2021)"
    notes: "The novel was reprinted with a revised timeline. This shifts many post-Rift events later in the timeline."
    community_response: "Generally accepted after initial confusion"
    training_data_risk: MEDIUM  # Some training data will have the old timeline

  - id: primaris-marines-knowledge
    faction: Adeptus Astartes
    date_retconned: 2017-ongoing
    old_claim: "Space Marine chapters had no knowledge of Primaris Marines before Guilliman's return"
    new_claim: "The creation of Primaris Marines was kept secret by Cawl for 10,000 years, but some chapters had limited awareness of the Ultima Founding preparations"
    source: "Various Codex supplements and Black Library novels"
    notes: "The exact timeline of who knew what and when is still being refined across publications."
    community_response: "Ongoing discussion"
    training_data_risk: MEDIUM  # Conflicting accounts in training data

  - id: necron-ctan-shards
    faction: Necrons
    date_retconned: 2011  # 5th Edition
    old_claim: "C'tan are complete, god-like beings that the Necrons serve"
    new_claim: "Necrons shattered the C'tan into shards and use them as weapons. The Necrons are independent, not servants."
    source: "5th Edition Codex: Necrons (2011), carried forward to 10th Edition"
    notes: "This retcon is well-established but training data may still contain the pre-5th Edition version where C'tan were the masters."
    community_response: "Widely accepted after initial resistance"
    training_data_risk: LOW  # 15+ years old, most training data reflects the new version
