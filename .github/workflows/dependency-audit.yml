name: Dependency Audit

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write

jobs:
  audit:
    name: Check for outdated dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check for outdated packages
        id: outdated
        run: |
          echo "## npm outdated" > report.md
          echo "" >> report.md
          if npm outdated --long 2>/dev/null | tee outdated.txt; then
            echo "No outdated packages found." >> report.md
            echo "has_outdated=false" >> "$GITHUB_OUTPUT"
          else
            echo '```' >> report.md
            cat outdated.txt >> report.md
            echo '```' >> report.md
            echo "has_outdated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm audit
        id: audit
        run: |
          echo "" >> report.md
          echo "## npm audit" >> report.md
          echo "" >> report.md
          if npm audit --omit=dev 2>/dev/null | tee audit.txt; then
            echo "No vulnerabilities found." >> report.md
            echo "has_vulns=false" >> "$GITHUB_OUTPUT"
          else
            echo '```' >> report.md
            cat audit.txt >> report.md
            echo '```' >> report.md
            echo "has_vulns=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check devcontainer image freshness
        id: devcontainer
        run: |
          echo "" >> report.md
          echo "## Devcontainer" >> report.md
          echo "" >> report.md
          IMAGE=$(grep -oP '"image":\s*"\K[^"]+' .devcontainer/devcontainer.json || true)
          if [ -n "$IMAGE" ]; then
            echo "Current image: \`$IMAGE\`" >> report.md
            # Extract features
            echo "" >> report.md
            echo "### Features in use" >> report.md
            grep -oP '"ghcr\.io/[^"]+' .devcontainer/devcontainer.json | while read -r feat; do
              echo "- \`$feat\`" >> report.md
            done
          else
            echo "No devcontainer image found." >> report.md
          fi
          echo "" >> report.md
          echo "Review [devcontainer.json](.devcontainer/devcontainer.json) for available updates." >> report.md

      - name: Create or update issue
        if: steps.outdated.outputs.has_outdated == 'true' || steps.audit.outputs.has_vulns == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            const title = '🔄 Dependency Audit Report';

            // Find existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies',
              per_page: 100
            });
            const existing = issues.find(i => i.title === title);

            const issueBody = `${body}\n\n---\n_Auto-generated by the Dependency Audit workflow on ${new Date().toISOString().split('T')[0]}._\n_Run the workflow manually or let Dependabot handle individual updates._`;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: issueBody
              });
              console.log(`Updated issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: issueBody,
                labels: ['dependencies']
              });
              console.log(`Created issue #${issue.number}`);
            }
